{% extends 'base.html' %}

{% block title %}
Início • CalcEsqApp
{% endblock %}

{% block content %}

<div class="container py-3">

    <!-- Cabeçalho do app -->
    <div class="mb-4">
        <h4 class="fw-bold mb-1">CalcEsqApp</h4>
        <small class="text-muted">
            Ambiente de cálculo de esquadrias
        </small>
    </div>

    <!-- Card informativo simples -->
    <div class="card border-0 shadow-sm mb-3">
        <div class="card-body">

            <div class="d-flex justify-content-between align-items-center">
                <span class="text-muted small">Status do sistema</span>
                <span class="badge bg-success">Ativo</span>
            </div>

            <hr>

            <ul class="list-unstyled mb-0 text-muted small">
                <li>✔ Cálculo de portas</li>
                <li>✔ Cálculo de janelas</li>
                <li>✔ Medidas precisas</li>
            </ul>

        </div>
    </div>

</div>

{% endblock %}
